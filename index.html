<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapılacaklar Listesi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Giriş / Kayıt ekranı -->
  <div class="app" id="auth-view" hidden>
    <h1>📝 Yapılacaklar</h1>
    <p class="subtitle">Devam etmek için giriş yap veya kaydol</p>

    <form id="auth-form" class="auth-form">
      <input type="email" id="email" placeholder="E-posta" autocomplete="email" required>
      <input type="password" id="password" placeholder="Şifre (en az 6 karakter)" autocomplete="current-password" minlength="6" required>
      <div class="auth-buttons">
        <button type="submit" id="login-btn">Giriş Yap</button>
        <button type="button" id="signup-btn" class="secondary">Kaydol</button>
      </div>
      <p class="auth-msg" id="auth-msg"></p>
    </form>
  </div>

  <!-- Uygulama ekranı -->
  <div class="app" id="app-view" hidden>
    <div class="topbar">
      <h1>📝 Yapılacaklar</h1>
      <div class="user-box">
        <span id="user-email"></span>
        <button id="logout-btn">Çıkış</button>
      </div>
    </div>

    <form id="form" class="input-row">
      <input type="text" id="input" placeholder="Yeni görev ekle..." autocomplete="off">
      <button type="submit">Ekle</button>
    </form>

    <div class="filters">
      <button class="filter active" data-filter="all">Tümü</button>
      <button class="filter" data-filter="active">Aktif</button>
      <button class="filter" data-filter="done">Tamamlanan</button>
    </div>

    <ul id="list"></ul>

    <div class="footer">
      <span id="count">0 görev</span>
      <button id="clear">Tamamlananları temizle</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
