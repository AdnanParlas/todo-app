<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapılacaklar Listesi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>📝 Yapılacaklar</h1>

    <form id="form" class="input-row">
      <input type="text" id="input" placeholder="Yeni görev ekle..." autocomplete="off">
      <button type="submit">Ekle</button>
    </form>

    <div class="filters">
      <button class="filter active" data-filter="all">Tümü</button>
      <button class="filter" data-filter="active">Aktif</button>
      <button class="filter" data-filter="done">Tamamlanan</button>
    </div>

    <ul id="list"></ul>

    <div class="footer">
      <span id="count">0 görev</span>
      <button id="clear">Tamamlananları temizle</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
